name: capstone

services:
  api:
    build:
      context: ./backend
    environment:
      CAPSTONE_ENVIRONMENT: local
      CAPSTONE_DATABASE_URL: sqlite:////data/capstone.db
      CAPSTONE_DATA_ROOT: /data
      CAPSTONE_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      CAPSTONE_AI_PROVIDER: ${CAPSTONE_AI_PROVIDER:-deterministic}
      CAPSTONE_GEMINI_API_KEY: ${CAPSTONE_GEMINI_API_KEY:-}
      CAPSTONE_GEMINI_MODEL: ${CAPSTONE_GEMINI_MODEL:-gemini-2.5-flash-lite}
    volumes:
      - ./data:/data
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/ready')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://127.0.0.1:8000/api
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
